<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>Presence Guard</title>
  </head>
  <body>
    <main class="panel">
      <div class="masthead">
        <img src="../icons/icon-48.svg" alt="" width="32" height="32">
        <div>
          <h1>Presence Guard</h1>
          <p id="status">Off</p>
        </div>
      </div>

      <label class="toggle-row" for="enabled">
        <span>Protection</span>
        <input id="enabled" type="checkbox" role="switch" aria-describedby="status">
      </label>

      <p class="note">Applies to normal webpages after they load or reload.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
